<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="大家庭成员记录 - 个人相册">
  <meta name="theme-color" content="#E8833A">
  <title>个人相册 - 大家庭成员记录</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- 微信分享图标 -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📸</text></svg>">
</head>
<body>
  <!-- 密码保护弹窗 -->
  <div id="passwordOverlay" class="password-overlay">
    <div class="password-box">
      <div class="password-icon">🔐</div>
      <h2>大家庭成员记录</h2>
      <p>请输入访问密码</p>
      <div class="password-input-wrapper">
        <input 
          type="password" 
          id="passwordInput" 
          class="password-input" 
          placeholder="请输入密码"
          maxlength="20"
          autocomplete="off"
        >
      </div>
      <button id="passwordBtn" class="password-btn">进入相册</button>
      <div id="passwordError" class="password-error">密码错误，请重试</div>
    </div>
  </div>

  <!-- 主内容区 -->
  <div id="mainContent" style="display: none;">
    <!-- 加载状态 -->
    <div id="loadingContainer" class="loading-container">
      <div class="loading-spinner"></div>
      <p class="loading-text">正在加载相册...</p>
    </div>

    <!-- 错误状态 -->
    <div id="errorContainer" class="error-container" style="display: none;">
      <div class="error-icon">⚠️</div>
      <h2 class="error-title">加载失败</h2>
      <p class="error-message" id="errorMessage">无法加载相册数据，请检查网络连接后重试。</p>
    </div>

    <!-- 页面内容 -->
    <div id="pageContent" class="page-content" style="display: none;">
      <!-- 详情头部 -->
      <header class="detail-header">
        <div class="detail-header-content">
          <button class="back-btn" onclick="goBack()" aria-label="返回">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
          </button>
          <img id="memberAvatar" class="detail-avatar" src="" alt="头像">
          <div class="detail-info">
            <h1 id="memberName" class="detail-name"></h1>
            <p class="detail-stats">
              共 <span id="photoCount">0</span>
            </p>
          </div>
        </div>
      </header>

      <!-- 时间轴相册 -->
      <main class="timeline-container">
        <div id="timeline" class="timeline">
          <!-- 时间轴项目将通过JS动态生成 -->
        </div>
        
        <!-- 空状态 -->
        <div id="emptyState" class="empty-state" style="display: none;">
          <div class="empty-icon">📷</div>
          <h2 class="empty-title">暂无照片</h2>
          <p class="empty-desc">该成员还没有上传照片或视频，快去添加一些美好回忆吧！</p>
        </div>
      </main>
    </div>
  </div>

  <script src="js/gallery.js"></script>
  <script>
    // 密码保护逻辑
    (function() {
      const CORRECT_PASSWORD = '20031023';
      const passwordOverlay = document.getElementById('passwordOverlay');
      const mainContent = document.getElementById('mainContent');
      const passwordInput = document.getElementById('passwordInput');
      const passwordBtn = document.getElementById('passwordBtn');
      const passwordError = document.getElementById('passwordError');

      // 检查是否已验证
      const isVerified = sessionStorage.getItem('familyAlbumVerified');
      if (isVerified === 'true') {
        passwordOverlay.style.display = 'none';
        mainContent.style.display = 'block';
      }

      // 验证密码
      function verifyPassword() {
        const input = passwordInput.value.trim();
        if (input === CORRECT_PASSWORD) {
          sessionStorage.setItem('familyAlbumVerified', 'true');
          passwordOverlay.style.display = 'none';
          mainContent.style.display = 'block';
        } else {
          passwordError.classList.add('show');
          passwordInput.value = '';
          passwordInput.focus();
          setTimeout(() => {
            passwordError.classList.remove('show');
          }, 3000);
        }
      }

      // 事件监听
      passwordBtn.addEventListener('click', verifyPassword);
      passwordInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          verifyPassword();
        }
      });

      // 自动聚焦
      passwordInput.focus();
    })();

    // 返回首页
    function goBack() {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
