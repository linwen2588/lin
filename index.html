<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="大家庭成员记录 - 记录美好时光">
  <meta name="theme-color" content="#E8833A">
  <title>大家庭成员记录</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- 微信分享图标 -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👨‍👩‍👧‍👦</text></svg>">
</head>
<body>
  <!-- 密码保护弹窗 -->
  <div id="passwordOverlay" class="password-overlay">
    <div class="password-box">
      <div class="password-icon">🔐</div>
      <h2>大家庭成员记录</h2>
      <p>请输入访问密码</p>
      <div class="password-input-wrapper">
        <input 
          type="password" 
          id="passwordInput" 
          class="password-input" 
          placeholder="请输入密码"
          maxlength="20"
          autocomplete="off"
        >
      </div>
      <button id="passwordBtn" class="password-btn">进入相册</button>
      <div id="passwordError" class="password-error">密码错误，请重试</div>
    </div>
  </div>

  <!-- 主内容区 -->
  <div id="mainContent" style="display: none;">
    <!-- 头部 -->
    <header class="header">
      <div class="header-icon">👨‍👩‍👧‍👦</div>
      <h1>大家庭成员记录</h1>
      <p>记录每一个美好瞬间</p>
    </header>

    <!-- 加载状态 -->
    <div id="loadingContainer" class="loading-container">
      <div class="loading-spinner"></div>
      <p class="loading-text">正在加载家庭成员...</p>
    </div>

    <!-- 错误状态 -->
    <div id="errorContainer" class="error-container" style="display: none;">
      <div class="error-icon">⚠️</div>
      <h2 class="error-title">加载失败</h2>
      <p class="error-message" id="errorMessage">无法加载家庭数据，请检查网络连接后重试。</p>
    </div>

    <!-- 成员网格 -->
    <main id="membersContainer" class="members-container" style="display: none;">
      <div id="membersGrid" class="members-grid">
        <!-- 成员卡片将通过JS动态生成 -->
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script>
    // 密码保护逻辑
    (function() {
      const CORRECT_PASSWORD = '20031023';
      const passwordOverlay = document.getElementById('passwordOverlay');
      const mainContent = document.getElementById('mainContent');
      const passwordInput = document.getElementById('passwordInput');
      const passwordBtn = document.getElementById('passwordBtn');
      const passwordError = document.getElementById('passwordError');

      // 检查是否已验证
      const isVerified = sessionStorage.getItem('familyAlbumVerified');
      if (isVerified === 'true') {
        passwordOverlay.style.display = 'none';
        mainContent.style.display = 'block';
      }

      // 验证密码
      function verifyPassword() {
        const input = passwordInput.value.trim();
        if (input === CORRECT_PASSWORD) {
          sessionStorage.setItem('familyAlbumVerified', 'true');
          passwordOverlay.style.display = 'none';
          mainContent.style.display = 'block';
        } else {
          passwordError.classList.add('show');
          passwordInput.value = '';
          passwordInput.focus();
          setTimeout(() => {
            passwordError.classList.remove('show');
          }, 3000);
        }
      }

      // 事件监听
      passwordBtn.addEventListener('click', verifyPassword);
      passwordInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          verifyPassword();
        }
      });

      // 自动聚焦
      passwordInput.focus();
    })();
  </script>
</body>
</html>
